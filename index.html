<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">
    <title>Автобиография</title>
</head>
<body>
    <div id="header-layout"></div>
    <main>
        <h2 class="caption">Главная</h2>
        <div class="block">
            <div class="text t_1">
                <div class="text1_block">
                    <h2>Привет! Меня зовут - Руслан</h2>
                    <p class="p1">
                        <br />
                        На данный момент мне 19 лет, являюсь студентом 2 курса Тюменского Государственного университета (ТюмГУ).<br />
                        Интересна <strong>IT-сфера</strong>, поэтому я учусь на направлении "Информационные системы и технологии".
                    </p>
                </div>
                <figure>
                    <img class="avatar" src="static/images/avatar.jpg" alt="Моя фотография" width="600" height="400" loading="eager"/>
                    <figcaption>Это я (типа люди в чёрном)</figcaption>
                </figure>
            </div>
            <div id="dynamic-lists-layout"></div>
            <div id="stat-panel" class="text t_3">
                <h3>Ваша статистика</h3>
                <div class="stat-grid">
                    <p>Визитов: <span id="visit-count">0</span></p>
                    <p>Среднее время: <span id="avg-time">0</span> сек.</p>
                </div>
                <button id="reset-stats" class="reset-button">Сбросить данные</button>
            </div>
        </div>
    </main>
    <div id="footer-layout"></div>
    <script type="module" src="js/main.js"></script> 
</body>
</html>
